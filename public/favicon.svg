<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: rounded pixel notebook -->
  <rect x="4" y="2" width="24" height="28" rx="3" fill="#7c3aed"/>
  <rect x="6" y="4" width="20" height="24" rx="2" fill="#f3f0ff"/>

  <!-- Notebook lines -->
  <rect x="9" y="10" width="14" height="2" rx="1" fill="#ddd6fe"/>
  <rect x="9" y="15" width="14" height="2" rx="1" fill="#ddd6fe"/>
  <rect x="9" y="20" width="10" height="2" rx="1" fill="#ddd6fe"/>

  <!-- Pixel sparkle / star (top-right) -->
  <rect x="25" y="1" width="2" height="2" fill="#f59e0b"/>
  <rect x="23" y="3" width="2" height="2" fill="#f59e0b"/>
  <rect x="27" y="3" width="2" height="2" fill="#f59e0b"/>
  <rect x="25" y="5" width="2" height="2" fill="#f59e0b"/>

  <!-- Pixel sparkle small (top-left) -->
  <rect x="1" y="5" width="2" height="2" fill="#fbbf24"/>

  <!-- Cute pixel pencil on notebook -->
  <rect x="10" y="7" width="2" height="2" fill="#7c3aed"/>
  <rect x="12" y="5" width="2" height="2" fill="#7c3aed"/>
</svg>
